<div class="container">
<main class="main">

    <form class="panelP-formularioProductos" action="usuarios.html" method="GET">
        <h2>Registrar Nuevo Usuario</h2>
        <p style="margin-bottom: 20px; color: #666;">Complete los datos para dar acceso al sistema a un nuevo colaborador.</p>

        <label for="vchnombre">Nombre(s):</label>
        <input type="text" id="vchnombre" name="vchnombre" placeholder="Ej. Juan Carlos" required>

        <label for="vchapellido">Apellido(s):</label>
        <input type="text" id="vchapellido" name="vchapellido" placeholder="Ej. Pérez López" required>

        <label for="vchcorreo">Correo Electrónico (Será su usuario):</label>
        <input type="email" id="vchcorreo" name="vchcorreo" placeholder="correo@empresa.com" required>

        <label for="vchRol">Rol / Puesto:</label>
        <select id="vchRol" name="vchRol" required>
            <option value="" disabled selected>Seleccione un puesto...</option>
            <option value="Administrador">Administrador</option>
            <option value="Vendedor">Vendedor</option>
            <option value="Encargado">Encargado</option>
        </select>

        <label for="vchpassword">Contraseña Temporal:</label>
        <input type="password" id="vchpassword" name="vchpassword" placeholder="Mínimo 6 caracteres" minlength="6" required>

        <div class="botones">
            <button type="submit" class="guardar">Crear Usuario</button>
            <button type="button" class="cancelar" onclick="window.location.href='usuarios.html'">Cancelar</button>
        </div>
    </form>

</main>
