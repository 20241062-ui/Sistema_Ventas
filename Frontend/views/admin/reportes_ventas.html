<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Reportes - Sistema de Ventas</title>
    <link rel="stylesheet" href="../../public/css/estiloAdmin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .contenedor-reportes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .tarjeta-grafica {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-volver {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .contenedor-reportes { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header-admin">
    <div class="contenedor-header">
        <a href="menuAdministrador.html">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/whitelogo.png" alt="Logo" class="logo">
        </a>
        <nav class="nav-admin">
            <a href="menuAdministrador.html">Productos</a>
            <a href="ventas.html" class="active">Ventas</a>
            <a href="compra.html">Compras</a>
            <a href="categorias.html">Categorías</a>
            <a href="marcas.html">Marcas</a>
            <a href="proveedores.html">Proveedores</a>
            <a href="listaSucursales.html">Sucursales</a>
            <a href="informacionEmpresa.html">Información</a>
            <a href="clientes.html">Clientes</a>
            <a href="preguntasFrecuentes.html">FAQ</a>
            <a href="contactoLista.html">Contacto</a>
            <a href="usuarios.html">Usuarios</a>
        </nav>
        <div class="user-menu">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/profileicon.jpg" alt="Perfil" class="profileicon">
        </div>
    </div>
</header>

<div class="container">
    <main class="main">
        <br>
        <a href="ventas.html" class="btn-volver">← Volver a Lista de Ventas</a>
        
        <h2>Tablero de Reportes y Estadísticas</h2>

        <div class="contenedor-reportes">
            
            <div class="tarjeta-grafica">
                <h3>🏆 Top 5 Productos Más Vendidos</h3>
                <canvas id="chartProductos"></canvas>
            </div>

            <div class="tarjeta-grafica">
                <h3>📈 Ingresos por Mes (2026)</h3>
                <canvas id="chartMeses"></canvas>
            </div>

        </div>
    </main>
</div>



<script>
    // 1. Datos de ejemplo para Productos (Simulando JSON de PHP)
    const ctxProd = document.getElementById('chartProductos');
    const dataProductos = {
        labels: ['iPhone 15 Pro', 'Samsung Galaxy S23', 'Sony Headphones', 'Apple Watch', 'LG Smart TV'],
        datasets: [{
            label: 'Unidades Vendidas',
            data: [45, 32, 28, 20, 15],
            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'],
            hoverOffset: 10
        }]
    };

    new Chart(ctxProd, {
        type: 'doughnut',
        data: dataProductos,
        options: { responsive: true }
    });

    // 2. Datos de ejemplo para Ventas Mensuales
    const ctxMes = document.getElementById('chartMeses');
    const dataMeses = {
        labels: ['Enero', 'Febrero', 'Marzo', 'Abril'],
        datasets: [{
            label: 'Ingresos ($ MXN)',
            data: [85000, 112000, 95000, 130000],
            backgroundColor: '#8737d1ff',
            borderColor: '#8737d1ff',
            borderWidth: 1
        }]
    };

    new Chart(ctxMes, {
        type: 'bar',
        data: dataMeses,
        options: {
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

<footer>
    <div class="linksFooter">  
        <a>© 2026 FlashCode — Sistema de Ventas</a>
    </div>
</footer>

</body>
</html>
