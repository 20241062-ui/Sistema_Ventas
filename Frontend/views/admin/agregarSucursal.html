<form class="panelP-formularioProductos" action="listaSucursales.html" method="GET">

    <h2>Nueva Sucursal</h2>

    <label>Nombre de la sucursal:</label>
    <input type="text" name="nombre"
           pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$"
           maxlength="100" placeholder="Ej. Sucursal Centro" required>

    <label>Dirección:</label>
    <input type="text" name="direccion"
           pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\s#.-]+"
           maxlength="200" placeholder="Calle, número y colonia" required>

    <label>Ciudad:</label>
    <input type="text" name="ciudad"
           pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$"
           maxlength="100" placeholder="Ej. CDMX" required>

    <label>Teléfono:</label>
    <input type="text" name="telefono"
           pattern="[0-9]{10}"
           maxlength="10"
           placeholder="10 dígitos">

    <label>Horario:</label>
    <input type="text" name="horario"
           pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\s:-]+"
           maxlength="50"
           placeholder="Ej. 9am - 6pm">

    <label>Link de Google Maps:</label>
    <input type="text" name="linkmapa"
           maxlength="300"
           placeholder="https://goo.gl/maps/...">

    <div class="botones">
      <button type="submit" class="guardar">Guardar</button>
      <button type="button" class="cancelar" onclick="window.location.href='listaSucursales.html'">
        Cancelar
      </button>
    </div>

</form>
