</head>

<header class="header-admin">
    <div class="contenedor-header">
        <a href="menuAdministrador.html">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/whitelogo.png" alt="Logo" class="logo">
        </a>

        <nav class="nav-admin">
            <a href="menuAdministrador.html">Productos</a>
            <a href="ventas.html">Ventas</a>
            <a href="compra.html">Compras</a>
            <a href="categorias.html">Categorías</a>
            <a href="marcas.html">Marcas</a>
            <a href="proveedores.html">Proveedores</a>
            <a href="listaSucursales.html">Sucursales</a>
            <a href="informacionEmpresa.html">Información</a>
            <a href="clientes.html">Clientes</a>
            <a href="preguntasFrecuentes.html">FAQ</a>
            <a href="contactoLista.html">Contacto</a>
            <a href="usuarios.html">Usuarios</a>
        </nav>

        <div class="user-menu">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/profileicon.jpg" alt="Perfil" class="profileicon">
            <div class="menu">
                <a href="perfilAdmin.html">Mi cuenta</a>
                <a href="../publico/index.html">Inicio</a>
                <a href="../publico/cerrar_sesion.html">Cerrar Sesión</a>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <main class="main">

        <form class="panelP-formularioProductos" action="menuAdministrador.html" method="GET" enctype="multipart/form-data">
            <h2>Registrar nuevo producto</h2>

            <label for="vchNo_Serie">Número de serie:</label>
            <input type="text" id="vchNo_Serie" name="vchNo_Serie" placeholder="Ej. SMART-001" pattern="[A-Za-z0-9\-]+" required>

            <label for="vchNombre">Nombre:</label>
            <input type="text" id="vchNombre" name="vchNombre" placeholder="Nombre comercial del producto" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s0-9]+" required>

            <label for="vchDescripcion">Descripción:</label>
            <textarea id="vchDescripcion" name="vchDescripcion" rows="3" placeholder="Detalles técnicos, color, modelo..."></textarea>

            <label for="floPrecioCompra">Precio de compra:</label>
            <input type="number" step="1" min="0" id="floPrecioCompra" name="floPrecioCompra" placeholder="0" required>

            <label for="floPrecioUnitario">Precio de venta:</label>
            <input type="number" step="1" min="0" id="floPrecioUnitario" name="floPrecioUnitario" placeholder="0" required>

            <label for="intStock">Stock inicial:</label>
            <input type="number" step="1" min="0" id="intStock" name="intStock" value="0">

            <label for="intid_Categoria">Categoría:</label>
            <select id="intid_Categoria" name="intid_Categoria" required>
                <option value="">-- Selecciona --</option>
                <option value="1">Celulares</option>
                <option value="2">Accesorios</option>
                <option value="3">Electrodomésticos</option>
            </select>

            <label for="intid_Marca">Marca:</label>
            <select id="intid_Marca" name="intid_Marca" required>
                <option value="">-- Selecciona --</option>
                <option value="1">Apple</option>
                <option value="2">Samsung</option>
                <option value="3">Sony</option>
                <option value="4">LG</option>
            </select>

            <label for="vchImagen">Imagen del producto:</label>
            <input type="file" id="vchImagen" name="vchImagen" accept="image/jpeg, image/png, image/gif, image/webp" required onchange="validarImagen(this);">

            <div class="botones">
                <button type="submit" class="guardar">Guardar</button>
                <button type="button" class="cancelar" onclick="window.location.href='menuAdministrador.html'">Cancelar</button>
            </div>
        </form>

    </main>
</div>

<footer>
    <div class="linksFooter">
        <a>© 2026 Comercializadora Doble L — Sistema de Ventas</a>
    </div>
</footer>

<script>
    function validarImagen(input) {
        const tiposPermitidos = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
        const archivo = input.files[0];
    
        if (archivo) {
            const nombreArchivo = archivo.name.toLowerCase();
            let esValido = false;
            
            for (let i = 0; i < tiposPermitidos.length; i++) {
                if (nombreArchivo.endsWith(tiposPermitidos[i])) {
                    esValido = true;
                    break;
                }
            }
                
            if (!esValido) {
                alert('Error: Solo se permiten archivos de imagen (JPG, PNG, GIF o WEBP).');
                input.value = ""; 
                return false;
            }
        }
        return true;
    }
</script>
</body>
</html>
