        <a href="menuAdministrador.html">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/whitelogo.png" class="logo" alt="Logo">
        </a>
        <nav class="nav-admin">
            <a href="menuAdministrador.html">Productos</a>
            <a href="ventas.html">Ventas</a>

        <div class="user-menu">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/profileicon.jpg" class="profileicon" alt="Perfil">

                <a href="../publico/cerrar_sesion.html">Cerrar Sesión</a>
            </div>
        </div>
    </div>
</header>

<div class="container">
<main class="main">

    <form class="panelP-formularioProductos" action="usuarios.html" method="GET">
        <h2>Editar Datos de Usuario</h2>

        <label>ID Usuario:</label>
        <input type="text" value="10" readonly style="background-color: #eee;">

        <label>Nombre(s):</label>
        <input type="text" name="vchnombre" value="Admin" required>

        <label>Apellido(s):</label>
        <input type="text" name="vchapellido" value="Sistema" required>

        <label>Correo Electrónico:</label>
        <input type="email" name="vchcorreo" value="admin@flashcode.com" required>

        <label>Rol del Sistema:</label>
        <select name="vchRol" required>
            <option value="Administrador" selected>Administrador</option>
            <option value="Vendedor">Vendedor</option>
            <option value="Encargado">Encargado</option>
        </select>

        <label>Nueva Contraseña (Dejar vacío para no cambiar):</label>
        <input type="password" name="vchpassword" placeholder="Nueva contraseña opcional">

        <div class="botones">
            <button type="submit" class="guardar">Actualizar Usuario</button>
            <button type="button" class="cancelar" onclick="window.location.href='usuarios.html'">Cancelar</button>
        </div>
    </form>

</main>
</div>



<footer>
    <div class="linksFooter">
        <a>© 2026 FlashCode — Sistema de Ventas</a>
    </div>

</body>
