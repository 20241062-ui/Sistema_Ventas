<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Productos - Sistema de Ventas</title>
    <link rel="stylesheet" href="../../public/css/estiloAdmin.css">
</head>
<body>
    <header class="header-admin">
        <div class="contenedor-header">
            <a href="menuAdministrador.html">
                <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/whitelogo.png" alt="Logo" class="logo">
            </a>
            <nav class="nav-admin">
                <a href="menuAdministrador.html">Productos</a>
                <a href="ventas.html" class="active">Ventas</a>
                <a href="compra.html">Compras</a>
                <a href="categorias.html">Categorías</a>
                <a href="marcas.html">Marcas</a>
                <a href="proveedores.html">Proveedores</a>
                <a href="listaSucursales.html">Sucursales</a>
                <a href="informacionEmpresa.html">Información</a>
                <a href="clientes.html">Clientes</a>
                <a href="preguntasFrecuentes.html">FAQ</a>
                <a href="contactoLista.html">Contacto</a>
                <a href="usuarios.html">Usuarios</a>
            </nav>
            <div class="user-menu">
                <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/profileicon.jpg" alt="Perfil" class="profileicon">
                <div class="menu" id="menu-usuario-admin">
                    </div>
            </div>
        </div>
    </header>

    <div class="container">
        <main class="main">
            <h2>Productos registrados</h2>

            <div class="cards">
                <div class="card">
                    <h3>Total productos</h3>
                    <p class="big" id="count-total">--</p>
                </div>
                <div class="card success">
                    <h3>Activos</h3>
                    <p class="big" id="count-activos">--</p>
                </div>
                <div class="card warning">
                    <h3>Inactivos</h3>
                    <p class="big" id="count-inactivos">--</p>
                </div>
            </div>

            <div class="productos-superior">
                <button class="btn-superior" onclick="window.location.href='producto_nuevo.html'">Nuevo producto</button>

                <div class="productos-buscar">
                    <input type="search" id="input-buscar" placeholder="Buscar producto...">
                    <button type="button" id="btn-buscar" class="btn-superior buscar">🔍 Buscar</button>
                    <button type="button" id="btn-limpiar" class="btn-superior limpiar" style="display:none;">Limpiar</button>
                </div>
            </div>

            <div class="panel table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>N° Serie</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio Venta</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-body">
                        </tbody>
                </table>
            </div>

            <div class="paginacion" id="contenedor-paginacion">
                </div>
        </main>
    </div>

    <div class="accesibilidad">
        <button class="btn-accessibility" onclick="toggleAccesibilidad()">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/profileicon.jpg" alt="Accesibilidad" style="width: 40px; border-radius: 50%;">
        </button>
        <div class="panel-accesibilidad" id="panelAccesibilidad" style="display: none; flex-direction: column; position: fixed; bottom: 80px; right: 20px; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 8px; z-index: 1000;">
            <button onclick="cambiarTexto(1)">Aumentar Texto</button>
            <button onclick="cambiarTexto(-1)">Disminuir Texto</button>
            <button onclick="restaurarTexto()">Restaurar</button>
            <button onclick="toggleLectura()">Modo Lectura</button>
            <button onclick="leerPaginaCompleta()">Leer Página</button>
            <button onclick="detenerVoz()">Detener Voz</button>
        </div>
    </div>

    <footer>
        <div class="linksFooter">
            <a>© 2026 Comercializadora Doble L — Panel de Control</a>
        </div>
    </footer>

    
</body>
</html>
