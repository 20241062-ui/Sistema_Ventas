<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Doble L</title>
    <link rel="stylesheet" href="../../public/css/styles.css">
</head>
<body>
    <main>
        <form name="userdata" method="GET" action="index.html">
            <img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/blacklogo.png" alt="Logo" class="logo">
            <h2 class="titulo">Inicio de sesión</h2>
            
            <div class="textfields">
                <div class="campoTexto">
                    <label for="user">Correo electrónico</label>
                    <input type="email" name="user" class="textfield" id="user" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="campoTexto">
                    <label for="password">Contraseña</label>
                    <input type="password" name="password" class="textfield" id="password" required>
                </div> 
            </div>
            
            <div class="actionbuttons">
                <input type="submit" value="Continuar" class="continuar">
                
                <div class="createaccount">
                    <p>¿No tienes una cuenta?</p>
                    <a href="signup.html">Registrarse</a>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
