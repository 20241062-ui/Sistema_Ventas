<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Doble L</title>
    <link rel="stylesheet" href="../../public/css/home.css">
    </head>
<body>
    <header>
        <div class="contenedor-header">
            <a href="../index.html"><img src="https://comercializadorall.grupoctic.com/ComercializadoraLL/img/whitelogo.png" alt="Logo" class="logo"></a>
            <nav>
                <a href="../index.html" class="nav-link">Inicio</a>
                <a href="celulares.html" class="nav-link">Celulares</a>
                <a href="Accesorios.html" class="nav-link">Accesorios</a>
                <a href="Electrodomesticos.html" class="nav-link">Electrodomésticos</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="perfil-container">
            <div class="perfil-menu">
                <h2>Mi cuenta</h2>
                <p id="menu-user-info">Cargando...</p>
                <a href="perfil.html">Mis datos</a>
                <a href="actualizarPerfil.html" style="background-color: rgba(255, 255, 255, 0.4);">Editar información</a>
                <a href="#" id="logout-link">Cerrar Sesión</a>
            </div>
            <div class="perfil-info">
                <h3>Editar información de cliente</h3>
                <form id="form-actualizar-perfil">
                    <label>Nombre(s):</label>
                    <input type="text" name="vchNombre" id="input-nombre" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$" required>
                    
                    <label>Apellido Paterno:</label>
                    <input type="text" name="vchApellido_Paterno" id="input-paterno" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$" required>
                    
                    <label>Apellido Materno:</label>
                    <input type="text" name="vchApellido_Materno" id="input-materno" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$" required>
                    
                    <label>Teléfono de contacto:</label>
                    <input type="text" name="vchTelefono" id="vchTelefono" maxlength="10">
                    
                    <label>Correo electrónico (No modificable):</label>
                    <input type="email" id="input-correo" readonly>
                    
                    <label>Nueva Contraseña (dejar en blanco para no cambiar):</label>
                    <input type="password" name="vchpassword" placeholder="••••••••">
                    
                    <div class="botones">
                        <button type="submit" class="btn-guardar">Guardar cambios</button>
                        <button type="button" class="btn-cancelar" onclick="window.location.href='perfil.html'">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="../../public/js/actualizarPerfil.js"></script>
</body>
</html>
